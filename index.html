<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Checkout</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-color: #ffffff;
            --text-color: #1c1c1e;
            --primary-color: #007aff;
            --primary-active: #0056b3;
            --btn-bg: #e5e5ea;
            --btn-active: #d1d1d6;
            --danger-color: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center; /* Fixed typo here */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Adapts to iOS browser bars */
            padding: 16px;
        }

        .phone-container {
            width: 100%;
            max-width: 393px; 
            height: 100%;
            max-height: 852px; 
            background-color: var(--card-color);
            border-radius: 40px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .display-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .currency-symbol {
            font-size: 2rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .amount-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: -1px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
            width: 100%;
        }

        .key {
            background-color: var(--btn-bg);
            border: none;
            border-radius: 50%;
            aspect-ratio: 1;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .key:active {
            background-color: var(--btn-active);
        }

        .key.action {
            font-size: 1.4rem;
        }
        
        .key.clear {
            color: var(--danger-color);
        }

        .checkout-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.1s ease;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 10px;
        }

        .checkout-btn:active {
            background-color: var(--primary-active);
        }

        /* Full screen view when run natively on actual phone screens */
        @media (max-width: 430px) {
            body {
                padding: 0;
            }
            .phone-container {
                border-radius: 0;
                box-shadow: none;
                height: 100vh;
                height: 100dvh;
                max-height: 100dvh;
                padding: 24px 24px calc(24px + env(safe-area-inset-bottom)) 24px;
            }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <h1>Point of Sale</h1>
        </div>

        <div class="display-container">
            <div class="currency-symbol">$</div>
            <div class="amount-display" id="display">0.00</div>
        </div>

        <div class="keypad">
            <button class="key" onclick="appendNumber('1')">1</button>
            <button class="key" onclick="appendNumber('2')">2</button>
            <button class="key" onclick="appendNumber('3')">3</button>
            
            <button class="key" onclick="appendNumber('4')">4</button>
            <button class="key" onclick="appendNumber('5')">5</button>
            <button class="key" onclick="appendNumber('6')">6</button>
            
            <button class="key" onclick="appendNumber('7')">7</button>
            <button class="key" onclick="appendNumber('8')">8</button>
            <button class="key" onclick="appendNumber('9')">9</button>
            
            <button class="key action clear" onclick="clearDisplay()">C</button>
            <button class="key" onclick="appendNumber('0')">0</button>
            <button class="key action" onclick="deleteLast()">⌫</button>
        </div>

        <button class="checkout-btn" onclick="handleCheckout()">Check Out</button>
    </div>

    <script>
        let currentInput = "";

        function updateDisplay() {
            const displayEl = document.getElementById('display');
            if (currentInput === "" || currentInput === "0") {
                displayEl.innerText = "0.00";
                return;
            }
            
            const numericValue = parseFloat(currentInput) / 100;
            
            displayEl.innerText = numericValue.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function appendNumber(num) {
            if (currentInput === "" && num === "0") return;
            if (currentInput.length >= 9) return;
            currentInput += num;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = "";
            updateDisplay();
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        function handleCheckout() {
            const numericValue = currentInput === "" ? 0 : parseFloat(currentInput) / 100;
            
            if (numericValue <= 0) {
                alert("Please enter an amount greater than $0.00");
                return;
            }

            const formattedAmt = numericValue.toFixed(2);
            const targetUrl = `https://flashgroweb.github.io/pos/onlpay.html?amt=${formattedAmt}&id=2`;
            
            window.open(targetUrl, '_blank');
        }
    </script>
</body>
</html>
